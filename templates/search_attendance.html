<!DOCTYPE html>
<html>

<head>

    <title>Search Attendance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Search Attendance Records</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Student ID
                    </label>

                    <input
                        type="text"
                        name="student_id"
                        class="form-control"
                        placeholder="Enter Student ID (Example: MCA001)"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Search

                </button>

                <a href="/dashboard"
                   class="btn btn-primary">

                    Dashboard

                </a>

            </form>

            <hr>

            <h5>
                Records Found: {{ attendance|length }}
            </h5>

            <table class="table table-bordered table-striped mt-3">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Student ID</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>

                </tr>

                </thead>

                <tbody>

                {% for row in attendance %}

                <tr>

                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                    <td>{{ row[4] }}</td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
