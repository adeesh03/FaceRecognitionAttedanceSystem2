{% extends "base.html" %}{% block title %}Analytics · JAIN University{% endblock %}{% block head %}<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>{% endblock %}{% block content %}
<div class="mb-4"><p class="page-eyebrow mb-2">Insights</p><h1 class="page-title">Attendance analytics</h1><p class="text-muted">Attendance records grouped by student.</p></div><section class="panel p-4"><div style="height:420px"><canvas id="attendanceChart"></canvas></div></section>
{% endblock %}{% block scripts %}<script>new Chart(document.getElementById('attendanceChart'),{type:'bar',data:{labels:{{ labels|tojson }},datasets:[{label:'Attendance records',data:{{ values|tojson }},backgroundColor:'#6366f1',borderRadius:7}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}},x:{grid:{display:false}}}}});</script>{% endblock %}
