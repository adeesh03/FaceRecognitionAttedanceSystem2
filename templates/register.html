{% extends "base.html" %}{% block title %}Add student · JAIN University{% endblock %}{% block content %}
<div class="row justify-content-center"><div class="col-lg-7"><div class="mb-4"><p class="page-eyebrow mb-2">Students</p><h1 class="page-title">Register a student</h1><p class="text-muted">Add their official details before capturing and training face images.</p></div><section class="panel p-4"><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="row g-3"><div class="col-md-6"><label class="form-label" for="student_id">Student ID</label><input class="form-control" id="student_id" name="student_id" maxlength="40" required value="{{ request.form.get('student_id','') }}"></div><div class="col-md-6"><label class="form-label" for="name">Full name</label><input class="form-control" id="name" name="name" maxlength="120" required value="{{ request.form.get('name','') }}"></div><div class="col-md-6"><label class="form-label" for="department">Department</label><input class="form-control" id="department" name="department" maxlength="100" required value="{{ request.form.get('department','') }}"></div><div class="col-md-6"><label class="form-label" for="email">Email</label><input class="form-control" id="email" type="email" name="email" maxlength="255" required value="{{ request.form.get('email','') }}"></div></div><div class="d-flex gap-2 mt-4"><button class="btn btn-primary" type="submit">Register student</button><a class="btn btn-light" href="{{ url_for('students') }}">Cancel</a></div></form></section></div></div>
{% endblock %}
