{% extends "base.html" %}{% block title %}Add course · {{ config.INSTITUTION_NAME }}{% endblock %}{% block content %}<div class="mx-auto" style="max-width:760px"><p class="page-eyebrow">Academic structure</p><h1 class="page-title mb-4">Create course</h1><form class="panel p-4" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="row g-3"><div class="col-md-5"><label class="form-label">Course code</label><input class="form-control" name="course_code" placeholder="MCA401" required></div><div class="col-md-7"><label class="form-label">Course name</label><input class="form-control" name="course_name" required></div><div class="col-md-6"><label class="form-label">Department</label><input class="form-control" name="department" required></div><div class="col-md-6"><label class="form-label">Semester</label><input class="form-control" name="semester" placeholder="Semester 4" required></div><div class="col-12"><label class="form-label">Lecturer</label><select class="form-select" name="lecturer_id"><option value="">Unassigned</option>{% for l in lecturers %}<option value="{{ l.id }}">{{ l.staff_id }} — {{ l.name }}</option>{% endfor %}</select></div></div><button class="btn btn-primary mt-4">Create course</button></form></div>{% endblock %}
